<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <!--
    pages.js is the IIFE bundle produced by `npm run build:webview`.
    It registers all pages and exposes window.__mountPage / window.__updateProps.
    WPF calls __mountPage('PageName', 'root', {...props}) after NavigationCompleted.
  -->
  <script src="./pages.js"></script>
</body>
</html>
